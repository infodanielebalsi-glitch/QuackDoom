# Locations nginx specifiche del gioco Quake III Arena (QuakeJS).
# Installata in /etc/nginx/lan-game-hub.d/quake3.conf da deploy/setup.sh.

location /games/quake3/ {
    alias /opt/lan-game-hub/web/games/quake3/;
    try_files $uri $uri/ =404;
}

location /ws/quake3/ {
    proxy_pass http://127.0.0.1:27960;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
