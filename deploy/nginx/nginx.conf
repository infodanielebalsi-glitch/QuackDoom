# Config nginx del LAN Game Hub. Va installata come
# /etc/nginx/sites-available/lan-game-hub (con symlink in sites-enabled)
# da deploy/setup.sh. Per aggiungere/rimuovere un gioco, aggiungi o
# commenta il relativo "include" qui sotto: nessun'altra modifica
# necessaria in questo file.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /opt/lan-game-hub/web;
    index index.html;

    # Hub / landing page
    location / {
        try_files $uri $uri/ /index.html;
    }

    include /etc/nginx/lan-game-hub.d/*.conf;
}
